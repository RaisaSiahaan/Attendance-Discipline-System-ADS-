<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Champion Character</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- html5-qrcode -->
<script src="html5-qrcode.min.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>

body{
    background:#edf2f7;
    font-family:'Segoe UI',sans-serif;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

#reader{
    width:100%;
}

.info-title{
    font-size:14px;
    color:#888;
}

.info-value{
    font-size:20px;
    font-weight:bold;
}

.status-box{
    background:#f8f9fa;
    border-radius:10px;
    padding:12px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.scan-history{
    max-height:250px;
    overflow:auto;
}

.history-item{
    border-bottom:1px solid #eee;
    padding:8px;
}

.btn-save{
    width:100%;
	height:55px;
    font-size:20px;
}

.loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
z-index:9999;
justify-content:center;
align-items:center;
color:white;
font-size:25px;
}

.header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px 25px;
    background:#0d6efd;
    color:#fff;
}

.logo-wrapper{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.logo-circle{
    width:40px;
    height:40px;
    background:#fff;
    border-radius:50%;
    border:4px solid #FFD54F;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    flex-shrink:0;
}

.logo{
    width:30px;
    height:auto;
    object-fit:contain;
    display:block;
    margin:0;
}

.header-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:18px;
    font-weight:bold;
}

.header-title i{
    font-size:30px;
    color:#FFD54F;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo-wrapper">
        <div class="logo-circle">
            <a href="index.html">
                <img src="Logo.png" alt="Logo IPEKA" class="logo">
            </a>
        </div>
    </div>

    <div class="header-title">
        <i class="bi bi-award-fill"></i>
        <span>Attendance & Discipline System <br>IPEKA Pluit</span>
    </div>
</div>
<div class="container my-4">
<div class="row">
<div class="col-lg-5">
<div class="card p-3">
<h4 class="text-center mb-3">
<i class="bi bi-camera"></i>
Scan Kartu Pelajar
</h4>
<div class="d-grid mb-3">
<button class="btn btn-primary" id="btnCamera">
<i class="bi bi-camera"></i>
Buka Kamera
</button>
</div>

<div id="reader"></div>
<hr>
<div class="status-box text-primary" id="scanStatus">
Menunggu Scan...
</div>
</div>
</div>
<div class="col-lg-7">
<div class="card p-4">
<div class="row">
<div class="col-md-6 mb-3">
<div class="info-title">
Nama
</div>
<div class="info-value" id="nama">
-
</div>
</div>
<div class="col-md-6 mb-3">
<div class="info-title">
NIS
</div>
<div class="info-value" id="nis">
-
</div>
</div>
<div class="col-md-6 mb-3">
<div class="info-title">
Kelas
</div>
<div class="info-value" id="kelas">
-
</div>
</div>
<div class="col-md-6 mb-3">
<div class="info-title">
Status
</div>
<div class="info-value text-success" id="status">
Belum Scan
</div>
</div>
</div>
<hr>
<h5>Pelanggaran</h5>
<select class="form-select mb-3" id="jenis">
<option value="">-- Presensi/Pelanggaran --</option>
<option>Presensi</option>
<option>Datang Terlambat</option>
<option>Salah Seragam</option>
<option>Atribut Seragam Tidak Lengkap</option>
<option>Rambut Panjang</option>
<option>Terlambat Masuk Kelas</option>
</select>
<textarea
class="form-control mb-3"
rows="3"
placeholder="Keterangan"
id="keterangan"
></textarea>
<button
id="btnSimpan"
class="btn btn-danger btn-save"
onclick="saveAttendance()"
disabled>
<i class="bi bi-save"></i>
Simpan Data
</button>
</div>
</div>
</div>
<div class="row mt-4">
<div class="col-12">
<div class="card p-3">
<h4>
<i class="bi bi-clock-history"></i>
Riwayat Scan Hari Ini
</h4>
<div class="scan-history" id="history">
<div class="text-muted">
Belum ada data...
</div>
</div>
</div>
</div>
</div>
</div>
<div class="loading" id="loading">
<div>
<div class="spinner-border text-light"></div>
<br><br>
Memproses...
</div>
</div>

<script>
const API_URL ="https://script.google.com/macros/s/AKfycbyzkUCZURvBLxN6h7NA3FUE53Siv0FySkBfIR4kZc4aShbQJ_75aKm3wY-3Bf18oTI_Dw/exec";

let currentStudent = null;
let html5QrCode = null;
let cameraRunning = false;

const reader = "reader";
const btnCamera = document.getElementById("btnCamera");

btnCamera.addEventListener("click", () => {
    if (cameraRunning) {
        stopScanner();
    } else {
        startScanner();
    }
});

async function startScanner() {

    if (cameraRunning) return;

    try {

        html5QrCode = new Html5Qrcode(reader);

        const cameras = await Html5Qrcode.getCameras();

        if (!cameras || cameras.length === 0) {
            Swal.fire({
                icon: "error",
                title: "Kamera tidak ditemukan"
            });
            return;
        }

        // Cari kamera belakang
        const backCamera = cameras.find(camera => {
            const label = camera.label.toLowerCase();
            return (
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            );
        });

        const cameraId = backCamera ? backCamera.id : cameras[0].id;

        await html5QrCode.start(
            cameraId,
            {
                fps: 10,
                qrbox: {
                    width: 250,
                    height: 250
                },
                aspectRatio: 1.777,
                disableFlip: false
            },
            onScanSuccess,
            () => {
                // Abaikan scan error agar console tidak penuh
            }
        );

        cameraRunning = true;

        btnCamera.innerHTML =
            '<i class="bi bi-camera-video-off"></i> Tutup Kamera';

        document.getElementById("scanStatus").textContent =
            "📷 Kamera Aktif";

    } catch (err) {

        console.error(err);

        Swal.fire({
            icon: "error",
            title: "Gagal membuka kamera",
            text: String(err)
        });

    }
}

async function stopScanner() {

    if (!html5QrCode) return;

    try {

        await html5QrCode.stop();
        await html5QrCode.clear();

    } catch (err) {

        console.warn("Scanner sudah berhenti atau gagal dihentikan.", err);

    } finally {

        cameraRunning = false;
        html5QrCode = null;

        btnCamera.innerHTML =
            '<i class="bi bi-camera"></i> Buka Kamera';

        document.getElementById("scanStatus").textContent =
            "Menunggu Scan...";

    }

}

async function onScanSuccess(decodedText) {

    // Hentikan sementara scanner agar QR tidak terbaca berulang
    html5QrCode.pause(true);

    document.getElementById("scanStatus").textContent =
        "QR Berhasil Dibaca";

    Swal.fire({
        icon: "success",
        title: "QR Berhasil",
        text: decodedText,
        timer: 1200,
        showConfirmButton: false
    });

    try {

        await getSiswa(decodedText);

    } catch (err) {

        console.error(err);

    } finally {

        // Resume scanner hanya jika kamera masih aktif
        if (cameraRunning && html5QrCode) {

            setTimeout(() => {

                html5QrCode.resume();

                document.getElementById("scanStatus").textContent =
                    "📷 Kamera Aktif";

            }, 500);

        }

    }

}

async function getSiswa(barcode) {

    try {

        const response = await fetch(
            `${API_URL}?action=getSiswa&barcode=${encodeURIComponent(barcode)}`
        );

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.status) {

            currentStudent = data;

            document.getElementById("nama").textContent = data.nama;
            document.getElementById("nis").textContent = data.nis;
            document.getElementById("kelas").textContent = data.kelas;
            document.getElementById("status").textContent = "Siap Disimpan";

            document.getElementById("btnSimpan").disabled = false;

        } else {

            resetStudent();

            Swal.fire({
                icon: "error",
                title: "Siswa tidak ditemukan"
            });

        }

    } catch (err) {

        console.error(err);

        resetStudent();

        Swal.fire({
            icon: "error",
            title: "Gagal mengambil data",
            text: String(err)
        });

    }

}
async function saveAttendance() {

    if (!currentStudent) {
        Swal.fire({
            icon: "warning",
            title: "Silakan scan kartu terlebih dahulu"
        });
        return;
    }

    const jenis = document.getElementById("jenis").value;
    const keterangan = document.getElementById("keterangan").value;

    if (jenis === "") {
        Swal.fire({
            icon: "warning",
            title: "Pilih jenis pelanggaran"
        });
        return;
    }

    document.getElementById("loading").style.display = "flex";

    const data = {
        action: "saveAttendance",
        barcode: currentStudent.barcode,
        nis: currentStudent.nis,
        nama: currentStudent.nama,
        kelas: currentStudent.kelas,
        jenis: jenis,
        keterangan: keterangan
    };

    try {

        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const hasil = await response.json();

        document.getElementById("loading").style.display = "none";

        if (hasil.status) {

            Swal.fire({
                icon: "success",
                title: hasil.message
            });

            loadHistory();

            resetStudent();

            document.getElementById("jenis").value = "";
            document.getElementById("keterangan").value = "";

        } else {

            Swal.fire({
                icon: "error",
                title: hasil.message
            });

        }

    } catch (err) {

        document.getElementById("loading").style.display = "none";

        console.error(err);

        Swal.fire({
            icon: "error",
            title: "Gagal menyimpan",
            text: err.toString()
        });

    }

}
async function loadHistory() {

    const historyElement = document.getElementById("history");

    try {

        const response = await fetch(`${API_URL}?action=history`);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {

            historyElement.innerHTML =
                "<div class='text-muted'>Belum ada data...</div>";

            return;
        }

        let html = "";

        data.forEach(item => {

            html += `
                <div class="history-item">
                    <b>${item.waktu}</b><br>
                    ${item.nama}<br>
                    ${item.kelas}<br>
                    <span class="text-danger">${item.jenis}</span>
                </div>
            `;

        });

        historyElement.innerHTML = html;

    } catch (err) {

        console.error(err);

        historyElement.innerHTML = `
            <div class="text-danger">
                Gagal memuat riwayat.
            </div>
        `;

    }

}

// Load saat halaman dibuka
loadHistory();
</script>
</body>
</html>
