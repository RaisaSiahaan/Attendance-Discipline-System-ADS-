<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Champion Character</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- html5-qrcode -->
<script src="html5-qrcode.min.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>

body{
    background:#edf2f7;
    font-family:'Segoe UI',sans-serif;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

#reader{
    width:100%;
}

.info-title{
    font-size:14px;
    color:#888;
}

.info-value{
    font-size:20px;
    font-weight:bold;
}

.status-box{
    background:#f8f9fa;
    border-radius:10px;
    padding:12px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.scan-history{
    max-height:250px;
    overflow:auto;
}

.history-item{
    border-bottom:1px solid #eee;
    padding:8px;
}

.btn-save{
    width:100%;
	height:55px;
    font-size:20px;
}

.loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
z-index:9999;
justify-content:center;
align-items:center;
color:white;
font-size:25px;
}

.header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px 25px;
    background:#0d6efd;
    color:#fff;
}

.logo-wrapper{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.logo-circle{
    width:40px;
    height:40px;
    background:#fff;
    border-radius:50%;
    border:4px solid #FFD54F;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    flex-shrink:0;
}

.logo{
    width:30px;
    height:auto;
    object-fit:contain;
    display:block;
    margin:0;
}

.header-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:18px;
    font-weight:bold;
}

.header-title i{
    font-size:20px;
    color:#FFD54F;
}
#hasilCari{

    max-height:220px;
    overflow-y:auto;

}

#hasilCari .list-group-item{

    cursor:pointer;

}

#hasilCari .list-group-item:hover{

    background:#e9f3ff;

}
</style>
</head>
<body>

<div class="header">
    <div class="logo-wrapper">
        <div class="logo-circle">
            <a href="index.html">
                <img src="Logo.png" alt="Logo IPEKA" class="logo">
            </a>
        </div>
    </div>

    <div class="header-title">
        <i class="bi bi-award-fill"></i>
        <span>Attendance & Discipline System <br>IPEKA Pluit</span>
    </div>
</div>
<div class="container my-4">
<div class="row">
<div class="col-lg-5">
<div class="card p-3">
<h4 class="text-center mb-3">
<i class="bi bi-camera"></i>
Scan Kartu Pelajar
</h4>
<div class="d-grid mb-3">
<button class="btn btn-primary" id="btnCamera">
<i class="bi bi-camera"></i>
Buka Kamera
</button>
</div>

<hr>

<h6>
<i class="bi bi-search"></i>
Cari Nama Siswa
</h6>

<input
type="text"
id="searchNama"
class="form-control"
placeholder="Ketik minimal 2 huruf nama siswa">

<div
id="hasilCari"
class="list-group mt-2 mb-3">
</div>

<div id="reader"></div>

<hr>
<div class="status-box text-primary" id="scanStatus">
Menunggu Scan...
</div>
</div>
</div><br><br>
<div class="col-lg-7">
<div class="card p-4">
<div class="row">
<div class="col-md-6 mb-3">
<div class="info-title">
Nama
</div>
<div class="info-value" id="nama">
-
</div>
</div>
<div class="col-md-6 mb-3">
<div class="info-title">
NIS
</div>
<div class="info-value" id="nis">
-
</div>
</div>
<div class="col-md-6 mb-3">
<div class="info-title">
Kelas
</div>
<div class="info-value" id="kelas">
-
</div>
</div>
<div class="col-md-6 mb-3">
<div class="info-title">
Status
</div>
<div class="info-value text-success" id="status">
Belum Scan
</div>
</div>
</div>
<hr>
<h5>Pelanggaran</h5>
<select class="form-select mb-3" id="jenis">
<option value="">-- Presensi/Pelanggaran --</option>
<option>Presensi</option>
<option>Datang Terlambat</option>
<option>Salah Seragam</option>
<option>Atribut Seragam Tidak Lengkap</option>
<option>Rambut Panjang</option>
<option>Terlambat Masuk Kelas</option>
</select>
<textarea
class="form-control mb-3"
rows="3"
placeholder="Keterangan"
id="keterangan"
></textarea>
<button
id="btnSimpan"
class="btn btn-danger btn-save"
onclick="saveAttendance()"
disabled>
<i class="bi bi-save"></i>
Simpan Data
</button>
</div>
</div>
</div>
<div class="row mt-4">
<div class="col-12">
<div class="card p-3">
<h4>
<i class="bi bi-clock-history"></i>
Riwayat Scan Hari Ini
</h4>
<div class="scan-history" id="history">
<div class="text-muted">
Belum ada data...
</div>
</div>
</div>
</div>
</div>
</div>
<div class="loading" id="loading">
<div>
<div class="spinner-border text-light"></div>
<br><br>
Memproses...
</div>
</div>

<script>
const API_URL ="https://script.google.com/macros/s/AKfycbyhf5oB98eTXlpHPB5wT_1Hn4-OiK60zp-lEA0TeKj0hhvjnOlctaRG2f9yodIrIe8SYA/exec";

let currentStudent = null;
let daftarSiswa = [];
let html5QrCode = null;
let cameraRunning = false;

const searchInput = document.getElementById("searchNama");
const hasilCari = document.getElementById("hasilCari");

let debounceTimer = null;

searchInput.addEventListener("input", () => {
    const keyword = searchInput.value.trim();

    clearTimeout(debounceTimer);

    if (keyword.length < 2) {
        hasilCari.innerHTML = "";
        return;
    }

    debounceTimer = setTimeout(() => {
        searchSiswa(keyword);
    }, 300);
});
const reader = "reader";
const btnCamera = document.getElementById("btnCamera");

btnCamera.addEventListener("click", () => {
    if (cameraRunning) {
        stopScanner();
    } else {
        startScanner();
    }
});

async function startScanner() {

    if (cameraRunning) return;

    try {

        html5QrCode = new Html5Qrcode(reader);

        const cameras = await Html5Qrcode.getCameras();

        if (!cameras || cameras.length === 0) {
            Swal.fire({
                icon: "error",
                title: "Kamera tidak ditemukan"
            });
            return;
        }

        // Cari kamera belakang
        const backCamera = cameras.find(camera => {
            const label = camera.label.toLowerCase();
            return (
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            );
        });

        const cameraId = backCamera ? backCamera.id : cameras[0].id;

        await html5QrCode.start(
            cameraId,
            {
                fps: 10,
                qrbox: {
                    width: 250,
                    height: 250
                },
                aspectRatio: 1.777,
                disableFlip: false
            },
            onScanSuccess,
            () => {
                // Abaikan scan error agar console tidak penuh
            }
        );

        cameraRunning = true;

        btnCamera.innerHTML =
            '<i class="bi bi-camera-video-off"></i> Tutup Kamera';

        document.getElementById("scanStatus").textContent =
            "📷 Kamera Aktif";

    } catch (err) {

        console.error(err);

        Swal.fire({
            icon: "error",
            title: "Gagal membuka kamera",
            text: String(err)
        });

    }
}

async function stopScanner() {

    if (!html5QrCode) return;

    try {

        await html5QrCode.stop();
        await html5QrCode.clear();

    } catch (err) {

        console.warn("Scanner sudah berhenti atau gagal dihentikan.", err);

    } finally {

        cameraRunning = false;
        html5QrCode = null;

        btnCamera.innerHTML =
            '<i class="bi bi-camera"></i> Buka Kamera';

        document.getElementById("scanStatus").textContent =
            "Menunggu Scan...";

    }

}

async function onScanSuccess(decodedText) {

    // Hentikan sementara scanner agar QR tidak terbaca berulang
    html5QrCode.pause(true);

    document.getElementById("scanStatus").textContent =
        "QR Berhasil Dibaca";

    Swal.fire({
        icon: "success",
        title: "QR Berhasil",
        text: decodedText,
        timer: 1200,
        showConfirmButton: false
    });

    try {

        await getSiswa(decodedText);

    } catch (err) {

        console.error(err);

    } finally {

        // Resume scanner hanya jika kamera masih aktif
        if (cameraRunning && html5QrCode) {

            setTimeout(() => {

                html5QrCode.resume();

                document.getElementById("scanStatus").textContent =
                    "📷 Kamera Aktif";

            }, 500);

        }

    }

}

async function getSiswa(barcode) {

    try {

        const response = await fetch(
            `${API_URL}?action=getSiswa&barcode=${encodeURIComponent(barcode)}`
        );

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.status) {

            currentStudent = data;

            document.getElementById("nama").textContent = data.nama;
            document.getElementById("nis").textContent = data.nis;
            document.getElementById("kelas").textContent = data.kelas;
            document.getElementById("status").textContent = "Siap Disimpan";

            document.getElementById("btnSimpan").disabled = false;

            // Tampilkan riwayat pelanggaran
            cekPelanggaran(data.barcode);

        } else {

            currentStudent = null;

            document.getElementById("nama").textContent = "-";
            document.getElementById("nis").textContent = "-";
            document.getElementById("kelas").textContent = "-";
            document.getElementById("status").textContent = "Belum Scan";

            document.getElementById("btnSimpan").disabled = true;

            Swal.fire({
                icon: "error",
                title: "Siswa tidak ditemukan"
            });

        }

    } catch (err) {

        console.error(err);

        currentStudent = null;

        document.getElementById("nama").textContent = "-";
        document.getElementById("nis").textContent = "-";
        document.getElementById("kelas").textContent = "-";
        document.getElementById("status").textContent = "Belum Scan";

        document.getElementById("btnSimpan").disabled = true;

        Swal.fire({
            icon: "error",
            title: "Gagal mengambil data",
            text: String(err)
        });

    }

}

async function cekPelanggaran(barcode){

    try{

        const response = await fetch(
            `${API_URL}?action=cekPelanggaran&barcode=${encodeURIComponent(barcode)}`
        );

        const data = await response.json();

        if(!data.status) return;

        if(data.total <= 0) return;

        let daftar = "";

        data.detail.forEach(item=>{
            daftar += `
                <tr>
                    <td>${item.jenis}</td>
                    <td style="text-align:right"><b>${item.jumlah}x</b></td>
                </tr>
            `;
        });

        Swal.fire({
            icon:"warning",
            title:"Riwayat Pelanggaran",
            html:`
                <div style="text-align:left">
                    <p><b>Total Pelanggaran : ${data.total} kali</b></p>
                    <table class="table table-bordered">
                        ${daftar}
                    </table>
                    <small>Pelanggaran terakhir : <b>${data.terakhir}</b></small>
                </div>
            `,
            width:550
        });

    }catch(err){

        console.error(err);

    }

}

async function saveAttendance(){

    if(!currentStudent){
        Swal.fire({
            icon:"warning",
            title:"Silakan scan kartu terlebih dahulu"
        });
        return;
    }

    const jenis = document.getElementById("jenis").value;
    const keterangan = document.getElementById("keterangan").value;

    if(jenis===""){
        Swal.fire({
            icon:"warning",
            title:"Pilih jenis pelanggaran"
        });
        return;
    }

    document.getElementById("loading").style.display="flex";

    const kirim = {
        action:"saveAttendance",
        barcode:currentStudent.barcode,
        nis:currentStudent.nis,
        nama:currentStudent.nama,
        kelas:currentStudent.kelas,
        jenis:jenis,
        keterangan:keterangan
    };

    try{

        const response = await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify(kirim)
        });

        const hasil = await response.json();

        document.getElementById("loading").style.display="none";

        if(hasil.status){

            Swal.fire({
                icon:"success",
                title:hasil.message
            });

            // Refresh riwayat hari ini
            loadHistory();

            // Reset form
            currentStudent = null;

            document.getElementById("nama").textContent="-";
            document.getElementById("nis").textContent="-";
            document.getElementById("kelas").textContent="-";
            document.getElementById("status").textContent="Belum Scan";

            document.getElementById("jenis").value="";
            document.getElementById("keterangan").value="";

            document.getElementById("btnSimpan").disabled=true;

        }else{

            Swal.fire({
                icon:"error",
                title:hasil.message
            });

        }

    }catch(err){

        document.getElementById("loading").style.display="none";

        Swal.fire({
            icon:"error",
            title:"Gagal menyimpan",
            text:err.toString()
        });

    }

}
async function loadHistory() {

    const historyElement = document.getElementById("history");

    try {

        const response = await fetch(`${API_URL}?action=history`);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {

            historyElement.innerHTML =
                "<div class='text-muted'>Belum ada data...</div>";

            return;

        }

        let html = "";

        data.forEach(item => {

            let riwayatHtml = "";

            if (item.riwayat && item.riwayat.length > 0) {

                riwayatHtml = `
                    <div class="mt-2">
                        <b>📊 Rekap Pelanggaran</b>
                `;

                item.riwayat.forEach(r => {

                    let warna = "success";

                    if (r.jumlah >= 4) {
                        warna = "danger";
                    } else if (r.jumlah >= 2) {
                        warna = "warning";
                    }

                    riwayatHtml += `
                        <div class="d-flex justify-content-between border-bottom py-1">
                            <span>${r.jenis}</span>
                            <span class="badge bg-${warna}">
                                ${r.jumlah}x
                            </span>
                        </div>
                    `;

                });

                riwayatHtml += "</div>";

            } else {

                riwayatHtml = `
                    <div class="text-success mt-2">
                        <i class="bi bi-check-circle"></i>
                        Tidak ada riwayat pelanggaran
                    </div>
                `;

            }

            html += `
                <div class="history-item">

                    <div class="small text-secondary">
                        <i class="bi bi-calendar-event"></i>
                        ${item.tanggal}
                        &nbsp;&nbsp;
                        <i class="bi bi-clock"></i>
                        ${item.waktu}
                    </div>

                    <div class="fw-bold mt-1">
                        ${item.nama}
                    </div>

                    <div class="text-muted">
                        ${item.kelas}
                    </div>

                    <div class="mt-2">
                        <span class="badge bg-primary">
                            ${item.jenis}
                        </span>
                    </div>

                    ${riwayatHtml}

                </div>
            `;

        });

        historyElement.innerHTML = html;

    } catch(err){

        console.error(err);

        historyElement.innerHTML =
            "<div class='text-danger'>Gagal memuat riwayat.</div>";

    }

}

async function searchSiswa(keyword) {
    try {

        const response = await fetch(
            `${API_URL}?action=searchSiswa&nama=${encodeURIComponent(keyword)}`
        );

        const data = await response.json();

        console.log("SEARCH RESULT:", data);

        if (!data.status || !Array.isArray(data.data)) {
            hasilCari.innerHTML = "<div class='text-muted p-2'>Tidak ditemukan</div>";
            return;
        }

        renderHasilCari(data.data);

    } catch (err) {
        console.error(err);
        hasilCari.innerHTML = "<div class='text-danger p-2'>Gagal mencari data</div>";
    }
}

function renderHasilCari(data) {

    hasilCari.innerHTML = "";

    data.forEach(item => {

        const div = document.createElement("div");
        div.className = "list-group-item";
        div.innerHTML = `
            <b>${item.nama}</b><br>
            <small>${item.nis} - ${item.kelas}</small>
        `;

        div.onclick = () => selectSiswa(item.barcode);

        hasilCari.appendChild(div);
    });
}

async function selectSiswa(barcode) {
    searchInput.value = "";
    hasilCari.innerHTML = "";
    await getSiswa(barcode);
}

document.addEventListener("click", (e) => {
    if (!searchInput || !hasilCari) return;

    if (!searchInput.contains(e.target) && !hasilCari.contains(e.target)) {
        hasilCari.innerHTML = "";
    }
});
// Load saat halaman dibuka
loadHistory();
</script>
</body>
</html>
